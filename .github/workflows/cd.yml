name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image name
        id: vars
        run: echo "image=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.image }}:latest
            ghcr.io/${{ steps.vars.outputs.image }}:${{ github.sha }}

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy app-1
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT_APP1 }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD_APP1 }}
          script: |
            export PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/snap/bin
            mkdir -p ~/nochu
            cat > ~/nochu/docker-compose.app.yml << 'COMPOSE'
services:
  app:
    image: ghcr.io/team-hanseungil/nochu-be-nestjs:latest
    container_name: nochu-app
    ports:
      - "3000:3000"
    env_file: /home/$USER/nochu/.env
    restart: unless-stopped
COMPOSE
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin
            IMAGE=ghcr.io/team-hanseungil/nochu-be-nestjs:latest
            docker pull $IMAGE
            cd ~/nochu && docker-compose -f docker-compose.app.yml up -d

      - name: Deploy app-2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT_APP2 }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD_APP2 }}
          script: |
            export PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/snap/bin
            mkdir -p ~/nochu
            cat > ~/nochu/docker-compose.app.yml << 'COMPOSE'
services:
  app:
    image: ghcr.io/team-hanseungil/nochu-be-nestjs:latest
    container_name: nochu-app
    ports:
      - "3000:3000"
    env_file: /home/$USER/nochu/.env
    restart: unless-stopped
COMPOSE
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin
            IMAGE=ghcr.io/team-hanseungil/nochu-be-nestjs:latest
            docker pull $IMAGE
            cd ~/nochu && docker-compose -f docker-compose.app.yml up -d
